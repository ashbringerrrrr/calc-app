name: Build Windows Release

on:
  push:
    branches: [ "main"]
  pull_request:
    branches: [ "main"]
  workflow_dispatch:
  
jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install Boost via vcpkg
      run: |
        $vcpkgPath = "C:\vcpkg\vcpkg.exe"
        
        if (Test-Path $vcpkgPath) {
            Write-Host "vcpkg found at $vcpkgPath"
            & $vcpkgPath list
            
            Write-Host "Installing boost..."
            & $vcpkgPath install boost:x64-windows
            
            $boostRoot = "C:\vcpkg\installed\x64-windows"
            echo "BOOST_ROOT=$boostRoot" >> $env:GITHUB_ENV
            echo "Boost_INCLUDE_DIR=$boostRoot\include" >> $env:GITHUB_ENV
            Write-Host "Boost installed at $boostRoot"
        } else {
            Write-Error "vcpkg not found in standard path!"
            exit 1
        }
      shell: pwsh

    - name: Setup Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '5.15.2'
        target: 'desktop'
        arch: 'win64_mingw81'
        modules: ''
        dir: '${{ github.workspace }}/qt'
        cache: 'true'
        install-deps: 'false'

    - name: Configure CMake
      run: |
        cmake -S . -B build `
          -G "MinGW Makefiles" `
          -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_PREFIX_PATH="${{ github.workspace }}/qt/5.15.2/mingw81_64" `
          -Wno-dev
      shell: pwsh

    - name: Build Project
      run: |
        cmake --build build --config Release
      shell: pwsh

    - name: Deploy Qt Dependencies
      run: |
        $qtBinPath = "${{ github.workspace }}/qt/5.15.2/mingw81_64/bin"
        $exePath = "build/Release/calcapp.exe"
        
        & "$qtBinPath/windeployqt.exe" `
          --release `
          --no-compiler-runtime `
          --no-opengl-sw `
          "$exePath"
      shell: pwsh
      continue-on-error: true

    - name: Copy Runtime Libraries (MinGW)
      run: |
        $mingwBin = "C:\msys64\mingw64\bin"
        $targetDir = "build/Release"
        
        $libs = @(
            "libgcc_s_seh-1.dll",
            "libstdc++-6.dll",
            "libwinpthread-1.dll"
        )

        foreach ($lib in $libs) {
            $src = Join-Path $mingwBin $lib
            if (Test-Path $src) {
                Copy-Item $src $targetDir/
            }
        }
      shell: pwsh
      continue-on-error: true

    - name: Archive Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Calculator-Windows-Build
        path: |
          build/Release/CalcApp.exe
          build/Release/*.dll
          build/Release/platforms/
          build/Release/styles/
          build/Release/imageformats/
          build/Release/qml/
          build/Release/iconengines/
        retention-days: 90
