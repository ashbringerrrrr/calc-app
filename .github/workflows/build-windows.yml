name: Build Windows Release

on:
  push:
    branches: [ "main"]
  pull_request:
    branches: [ "main"]
  workflow_dispatch:
  
jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install Boost Headers (Fast)
      run: |
        $boostVersion = "1.84.0"
        $boostUnderscore = $boostVersion.Replace('.', '_')
        $url = "https://archives.boost.io/release/$boostVersion/source/boost_$boostUnderscore.tar.gz"
        $outFile = "boost.tar.gz"
        
        Write-Host "Downloading Boost headers ($boostVersion)..."
        Invoke-WebRequest -Uri $url -OutFile $outFile -UseBasicParsing
        
        Write-Host "Extracting..."
        $extractPath = "C:\local\boost"
        New-Item -ItemType Directory -Force -Path $extractPath | Out-Null
        
        tar -xzf $outFile -C $extractPath
        
        $innerFolder = Get-ChildItem -Path $extractPath -Directory | Select-Object -First 1
        $finalPath = $innerFolder.FullName
        
        Write-Host "Boost headers ready at: $finalPath"
        echo "BOOST_ROOT=$finalPath" >> $env:GITHUB_ENV
        echo "Boost_INCLUDE_DIR=$finalPath" >> $env:GITHUB_ENV
      shell: pwsh

    - name: Setup Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '5.15.2'
        target: 'desktop'
        arch: 'win64_mingw81'
        modules: ''
        dir: '${{ github.workspace }}/qt'
        cache: 'true'
        install-deps: 'false'
        
    - name: Configure CMake
      run: |
        $qtFolder = Get-ChildItem -Path "${{ github.workspace }}" -Recurse -Directory -Filter "mingw81_64" | Select-Object -First 1
        if (-not $qtFolder) { throw "Qt mingw81_64 folder not found!" }
        $qtBasePath = $qtFolder.Parent.FullName
        
        Write-Host "Configuring with Qt at: $qtBasePath"
        
        cmake -S . -B build `
          -G "MinGW Makefiles" `
          -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_PREFIX_PATH="$qtBasePath" `
          -DBOOST_ROOT="$env:BOOST_ROOT" `
          -Wno-dev
      shell: pwsh
      
    - name: Build Project
      run: |
        Write-Host "Starting build process..."
        cmake --build build --config Release -j 4
        if ($LASTEXITCODE -ne 0) { throw "Build failed!" }
        
        Write-Host "Build completed successfully."
        Write-Host "=== Contents of build folder ==="
        Get-ChildItem -Path "build" -Recurse -File | Select-Object FullName
      shell: pwsh
      
    - name: Locate Executable and Tools
      id: locate
      run: |
        $exe = Get-ChildItem -Path "build" -Filter "*.exe" -Recurse | 
               Where-Object { $_.Name -like "*CalcApp*" } | 
               Select-Object -First 1
        
        if (-not $exe) {
            $exe = Get-ChildItem -Path "build" -Filter "*.exe" -Recurse | Select-Object -First 1
        }

        if (-not $exe) {
            throw "No .exe file found in build directory! Check build logs."
        }
        
        Write-Host "Found EXE: $($exe.FullName)"
        echo "APP_EXE_PATH=$($exe.FullName)" >> $env:GITHUB_ENV
        echo "APP_EXE_DIR=$($exe.DirectoryName)" >> $env:GITHUB_ENV

        $qtFolder = Get-ChildItem -Path "${{ github.workspace }}" -Recurse -Directory -Filter "mingw81_64" | Select-Object -First 1
        $qtBasePath = $qtFolder.Parent.FullName
        $deployTool = Get-ChildItem -Path $qtBasePath -Filter "windeployqt.exe" -Recurse | Select-Object -First 1
        
        if (-not $deployTool) { throw "windeployqt.exe not found!" }
        
        Write-Host "Found Deploy Tool: $($deployTool.FullName)"
        echo "QT_DEPLOY_TOOL=$($deployTool.FullName)" >> $env:GITHUB_ENV
      shell: pwsh

    - name: Deploy Qt Dependencies
      run: |
        Write-Host "Running windeployqt for: $env:APP_EXE_PATH"
        
        & "$env:QT_DEPLOY_TOOL" --release --no-compiler-runtime --no-opengl-sw "$env:APP_EXE_PATH"
        Write-Host "windeployqt finished (ignoring its exit code)"
        
        $qtBinPath = Split-Path -Path "$env:QT_DEPLOY_TOOL" -Parent
        $qtRootPath = Split-Path -Path "$qtBinPath" -Parent
        $pluginsSource = Join-Path $qtRootPath "plugins"
        $qmlSource = Join-Path $qtRootPath "qml"
        $targetDir = $env:APP_EXE_DIR
        
        Write-Host "Qt Root Path: $qtRootPath"
        Write-Host "Copying plugins from: $pluginsSource"
        
        if (Test-Path "$pluginsSource\platforms") {
            Copy-Item -Path "$pluginsSource\platforms" -Destination "$targetDir" -Recurse -Force
            Write-Host "Copied platforms folder"
        } else {
            Write-Error "ERROR: platforms folder not found at $pluginsSource\platforms"
            Get-ChildItem -Path $pluginsSource -Directory -ErrorAction SilentlyContinue | Select-Object Name
            exit 1
        }
        
        $pluginFolders = @("styles", "imageformats", "iconengines")
        foreach ($folder in $pluginFolders) {
            if (Test-Path "$pluginsSource\$folder") {
                Copy-Item -Path "$pluginsSource\$folder" -Destination "$targetDir" -Recurse -Force
                Write-Host "Copied $folder folder"
            }
        }

        if (Test-Path $qmlSource) {
            Copy-Item -Path $qmlSource -Destination "$targetDir" -Recurse -Force
            Write-Host "Copied qml folder"
        }
        
        Write-Host "Deployment step completed!"
      shell: pwsh

    - name: Copy MinGW Runtimes
      run: |
        $mingwBin = "C:\msys64\mingw64\bin"
        $target = $env:APP_EXE_DIR
        $libs = @("libgcc_s_seh-1.dll", "libstdc++-6.dll", "libwinpthread-1.dll")
        
        foreach ($lib in $libs) {
            $src = Join-Path $mingwBin $lib
            if (Test-Path $src) {
                Copy-Item $src $target\
                Write-Host "Copied $lib"
            }
        }
      shell: pwsh
      
    - name: Archive Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Calculator-Windows-Build
        path: |
          ${{ env.APP_EXE_PATH }}
          ${{ env.APP_EXE_DIR }}/*.dll
          ${{ env.APP_EXE_DIR }}/platforms/
          ${{ env.APP_EXE_DIR }}/styles/
          ${{ env.APP_EXE_DIR }}/imageformats/
          ${{ env.APP_EXE_DIR }}/qml/
          ${{ env.APP_EXE_DIR }}/iconengines/
        retention-days: 90
        if-no-files-found: error
