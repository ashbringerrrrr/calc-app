name: Build Windows Release

on:
  push:
    branches: [ "main"]
  pull_request:
    branches: [ "main"]
  workflow_dispatch:
  
jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install Boost via vcpkg
      run: |
        $vcpkgPath = "C:\vcpkg\vcpkg.exe"
        if (Test-Path $vcpkgPath) {
            & $vcpkgPath install boost:x64-windows
            echo "BOOST_ROOT=C:\vcpkg\installed\x64-windows" >> $env:GITHUB_ENV
            echo "Boost_INCLUDE_DIR=C:\vcpkg\installed\x64-windows\include" >> $env:GITHUB_ENV
        } else {
            Write-Error "vcpkg not found!"
            exit 1
        }
      shell: pwsh

    - name: Setup Qt
      id: setup_qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '5.15.2'
        target: 'desktop'
        arch: 'win64_mingw81'
        modules: ''
        dir: '${{ github.workspace }}/qt'
        cache: 'true'
        install-deps: 'false'
        
    - name: Debug Paths and Find Files
      id: find_files
      shell: pwsh
      run: |
        Write-Host "=== Current Workspace: ${{ github.workspace }} ==="
        Write-Host "=== Listing root directory ==="
        Get-ChildItem -Path "${{ github.workspace }}" | Select-Object Name
        
        Write-Host "=== Looking for Qt installation ==="
        $qtRoot = Get-ChildItem -Path "${{ github.workspace }}" -Directory -Filter "mingw81_64" -Recurse | Select-Object -First 1
        
        if ($null -eq $qtRoot) {
            Write-Error "ERROR: Could not find 'mingw81_64' folder anywhere in workspace!"
            Write-Host "Full tree:"
            Get-ChildItem -Path "${{ github.workspace }}" -Recurse -Depth 2 | Select-Object FullName
            exit 1
        }
        
        $qtBase = $qtRoot.Parent.FullName
        Write-Host "Qt Base found at: $qtBase"
        echo "QT_BASE_PATH=$qtBase" >> $env:GITHUB_ENV

        $windeployqt = Get-ChildItem -Path $qtBase -Filter "windeployqt.exe" -Recurse | Select-Object -First 1
        if ($null -eq $windeployqt) {
            Write-Error "ERROR: windeployqt.exe not found!"
            exit 1
        }
        echo "QT_DEPLOY_TOOL=$($windeployqt.FullName)" >> $env:GITHUB_ENV

        Write-Host "=== Looking for CalcApp.exe ==="
        $appExe = Get-ChildItem -Path "build" -Filter "CalcApp.exe" -Recurse | Select-Object -First 1
        if ($null -eq $appExe) {
            Write-Error "ERROR: CalcApp.exe not found in build folder!"
            Write-Host "Contents of build folder:"
            Get-ChildItem -Path "build" -Recurse | Select-Object FullName
            exit 1
        }
        Write-Host "Found CalcApp.exe at: $($appExe.FullName)"
        echo "APP_EXE_PATH=$($appExe.FullName)" >> $env:GITHUB_ENV
        echo "APP_EXE_DIR=$($appExe.DirectoryName)" >> $env:GITHUB_ENV
      continue-on-error: false


    - name: Configure CMake
      run: |
        cmake -S . -B build `
          -G "MinGW Makefiles" `
          -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_PREFIX_PATH="$env:QT_BASE_PATH" `
          -DBOOST_ROOT="$env:BOOST_ROOT" `
          -Wno-dev
      shell: pwsh

    - name: Build Project
      run: |
        cmake --build build --config Release
      shell: pwsh

    - name: Deploy Qt Dependencies
      run: |
        Write-Host "Running: $env:QT_DEPLOY_TOOL on $env:APP_EXE_PATH"
        & "$env:QT_DEPLOY_TOOL" --release --no-compiler-runtime --no-opengl-sw "$env:APP_EXE_PATH"
      shell: pwsh

    - name: Copy Runtime Libraries (MinGW)
      run: |
        $mingwBin = "C:\msys64\mingw64\bin"
        $targetDir = $env:APP_EXE_DIR
        $libs = @("libgcc_s_seh-1.dll", "libstdc++-6.dll", "libwinpthread-1.dll")
        foreach ($lib in $libs) {
            $src = Join-Path $mingwBin $lib
            if (Test-Path $src) { Copy-Item $src $targetDir/ }
        }
      shell: pwsh

    - name: Archive Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Calculator-Windows-Build
        path: |
          ${{ env.APP_EXE_PATH }}
          ${{ env.APP_EXE_DIR }}/*.dll
          ${{ env.APP_EXE_DIR }}/platforms/
          ${{ env.APP_EXE_DIR }}/styles/
          ${{ env.APP_EXE_DIR }}/imageformats/
          ${{ env.APP_EXE_DIR }}/qml/
          ${{ env.APP_EXE_DIR }}/iconengines/
        retention-days: 90
